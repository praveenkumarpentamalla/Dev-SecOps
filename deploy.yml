# =============================================================================
# .github/workflows/deploy.yml
# CI/CD pipeline with a mandatory Gitleaks gate BEFORE deployment.
# Adapt the "deploy" step to your actual platform (ECS, Kubernetes, etc.)
# =============================================================================

name: "🚀 Build, Scan & Deploy"

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  id-token: write          # For OIDC-based cloud auth (preferred over static keys)
  security-events: write

jobs:
  # ---------------------------------------------------------------------------
  # Gate 1: Secret scan — MUST pass before any build or deploy step runs
  # ---------------------------------------------------------------------------
  secret-scan:
    name: "🔑 Secret scan (required gate)"
    runs-on: ubuntu-latest
    outputs:
      scan_passed: ${{ steps.scan.outcome == 'success' }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: "Run Gitleaks"
        id: scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            detect
            --config .gitleaks.toml
            --redact
            --exit-code=1
            --report-format=json
            --report-path=gitleaks-deploy-scan.json
            --log-level=warn

      - name: "Upload scan report"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "gitleaks-deploy-scan-${{ github.run_id }}"
          path: gitleaks-deploy-scan.json
          retention-days: 90   # Keep deploy scan reports longer

  # ---------------------------------------------------------------------------
  # Gate 2: Build — only runs if secret scan passed
  # ---------------------------------------------------------------------------
  build:
    name: "🔨 Build"
    runs-on: ubuntu-latest
    needs: secret-scan    # Explicit dependency — blocked until scan passes

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Set up Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: "Install dependencies"
        run: npm ci

      - name: "Run tests"
        run: npm test

      - name: "Build application"
        run: npm run build
        env:
          NODE_ENV: production

      - name: "Upload build artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "build-${{ github.sha }}"
          path: dist/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Gate 3: Deploy — only runs after both scan and build pass
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: "📦 Deploy to staging"
    runs-on: ubuntu-latest
    needs: [secret-scan, build]
    environment:
      name: staging
      url: https://staging.your-app.com

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Download build artifact"
        uses: actions/download-artifact@v4
        with:
          name: "build-${{ github.sha }}"
          path: dist/

      # Use OIDC to authenticate with AWS — NO static AWS keys in secrets
      - name: "Configure AWS credentials (OIDC)"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: us-east-1
          # No AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY needed — OIDC handles it

      - name: "Deploy to staging"
        run: |
          echo "Deploying to staging..."
          # Replace with your actual deploy command:
          # aws s3 sync dist/ s3://your-staging-bucket/
          # aws ecs update-service --cluster staging --service your-app --force-new-deployment
          # kubectl set image deployment/your-app your-app=your-image:${{ github.sha }}

  deploy-production:
    name: "🌐 Deploy to production"
    runs-on: ubuntu-latest
    needs: [secret-scan, build, deploy-staging]
    # Require manual approval via GitHub Environments
    environment:
      name: production
      url: https://your-app.com
    # Only auto-deploy to production on tags; otherwise require manual dispatch
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Download build artifact"
        uses: actions/download-artifact@v4
        with:
          name: "build-${{ github.sha }}"
          path: dist/

      - name: "Configure AWS credentials (OIDC)"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy-prod
          aws-region: us-east-1

      - name: "Deploy to production"
        run: |
          echo "Deploying to production..."
          # aws s3 sync dist/ s3://your-prod-bucket/
          # aws ecs update-service --cluster production --service your-app --force-new-deployment
